name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}

      - name: Package standalone build
        run: |
          [ -d public ] && cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp

      - name: Start application on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pm2 stop repo-topography 2>/dev/null || true
            pm2 delete repo-topography 2>/dev/null || true

            mkdir -p ~/repo-topography
            rm -rf ~/repo-topography/*
            tar -xzf /tmp/deploy.tar.gz -C ~/repo-topography
            rm /tmp/deploy.tar.gz

            cat > ~/repo-topography/.env << 'EOF'
            GITHUB_TOKEN=${{ secrets.GH_API_TOKEN }}
            EOF

            cat > ~/repo-topography/ecosystem.config.js << 'ECOSYSTEM'
            module.exports = {
              apps: [{
                name: "repo-topography",
                script: "server.js",
                env: {
                  PORT: 7847,
                  HOSTNAME: "0.0.0.0",
                  GITHUB_TOKEN: "${{ secrets.GH_API_TOKEN }}"
                }
              }]
            };
            ECOSYSTEM

            command -v pm2 >/dev/null 2>&1 || npm install -g pm2

            cd ~/repo-topography
            pm2 start ecosystem.config.js
            pm2 save
